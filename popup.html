<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      min-height: 120px;
      max-height: 400px;
      margin: 0;
      padding: 8px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .restore-btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #4a7fd4;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .restore-btn:hover {
      background: #3a6fc4;
    }
    .restore-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      max-height: 420px;
    }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    li:hover {
      background: #e8e8e8;
    }
    li .favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 2px;
    }
    li .label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty {
      color: #666;
      padding: 12px 0;
      text-align: center;
    }
    .footer {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e0e0e0;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
    .footer a {
      color: #4a7fd4;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2 id="title">Undo Close Tab</h2>
  <button class="restore-btn" id="restoreLast">Restore last closed tab</button>
  <ul id="list"></ul>
  <p class="empty" id="empty" style="display:none;">No recently closed tabs</p>
  <p class="footer" id="footer">
    By <a href="https://github.com/AlexRabbit" target="_blank" rel="noopener">AlexRabbit</a>
  </p>
  <script src="popup.js"></script>
</body>
</html>
